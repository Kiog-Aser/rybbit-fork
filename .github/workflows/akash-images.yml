# Build fork images for Akash without Docker on your machine.
# Run manually from GitHub → Actions → "Akash Images" → Run workflow.
# Requires: repo pushed to GitHub; GHCR packages set to Public after first run.

name: Akash Images

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Public URL (no trailing slash), e.g. https://analytics.example.com"
        required: true
        type: string
      image_tag:
        description: "Docker tag to publish"
        required: false
        default: akash
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image names
        run: |
          echo "REPO_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "TAG=${{ inputs.image_tag }}" >> "$GITHUB_ENV"
          echo "BASE_URL=${{ inputs.base_url }}" >> "$GITHUB_ENV"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/rybbit-backend:${{ env.TAG }}

      - name: Build and push client
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./client/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/rybbit-client:${{ env.TAG }}
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ env.BASE_URL }}
            NEXT_PUBLIC_DISABLE_SIGNUP=true
            NEXT_PUBLIC_LITE_DASHBOARD=true
            NEXT_PUBLIC_DEPLOYMENT=akash
            NEXT_PUBLIC_REVENUE_ATTRIBUTION=true