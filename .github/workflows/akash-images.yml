# Build fork images for Akash without Docker on your machine.
# Run manually from GitHub → Actions → "Akash Images" → Run workflow.
# Requires: repo pushed to GitHub; GHCR packages set to Public after first run.

name: Akash Images

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      base_url:
        description: "Public URL (no trailing slash), e.g. https://analytics.example.com"
        required: false
        default: "https://analytics.milh.tech"
        type: string
      image_tag:
        description: "Docker tag to publish"
        required: false
        default: akash
        type: string
      deploy_production:
        description: "After build, SSH deploy to production droplet (requires DEPLOY_HOST + DEPLOY_SSH_KEY secrets)"
        required: false
        default: false
        type: boolean

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      build_sha: ${{ steps.names.outputs.build_sha }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image names
        id: names
        run: |
          echo "REPO_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "TAG=${{ inputs.image_tag || 'akash' }}" >> "$GITHUB_ENV"
          echo "BASE_URL=${{ inputs.base_url || 'https://analytics.milh.tech' }}" >> "$GITHUB_ENV"
          echo "BUILD_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "build_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile.akash
          platforms: linux/amd64
          push: true
          build-args: |
            RYBBIT_BUILD_SHA=${{ env.BUILD_SHA }}
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/rybbit-backend:${{ env.TAG }}
            ghcr.io/${{ env.REPO_OWNER }}/rybbit-backend:akash-${{ env.BUILD_SHA }}
            ghcr.io/${{ env.REPO_OWNER }}/rybbit-backend:akash-v2

      - name: Build and push client
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./client/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/rybbit-client:${{ env.TAG }}
            ghcr.io/${{ env.REPO_OWNER }}/rybbit-client:akash-${{ env.BUILD_SHA }}
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ env.BASE_URL }}
            NEXT_PUBLIC_DISABLE_SIGNUP=true
            NEXT_PUBLIC_LITE_DASHBOARD=true
            NEXT_PUBLIC_DEPLOYMENT=akash
            NEXT_PUBLIC_REVENUE_ATTRIBUTION=true
            NEXT_PUBLIC_FORK_REPO=${{ github.repository }}

      - name: Build and push clickhouse
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./akash/clickhouse.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/rybbit-clickhouse:${{ env.TAG }}

      - name: Build and push caddy
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./akash/caddy.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/rybbit-caddy:${{ env.TAG }}

      - name: Make GHCR packages public (required for Akash pull)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for pkg in rybbit-backend rybbit-client rybbit-caddy rybbit-clickhouse; do
            gh api --method PATCH "/user/packages/container/${pkg}/visibility" -f visibility=public \
              && echo "Made ${pkg} public" \
              || echo "WARN: could not set ${pkg} public (set manually in github.com → Packages)"
          done

  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_production == true
    steps:
      - name: Deploy to production droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER || 'root' }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /rybbit
            SHA="${{ needs.build-and-push.outputs.build_sha }}"
            OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
            sed -i.bak -E "s|ghcr.io/${OWNER}/rybbit-backend:akash-[a-f0-9]+|ghcr.io/${OWNER}/rybbit-backend:akash-${SHA}|g" docker-compose.yml
            sed -i.bak -E "s|ghcr.io/${OWNER}/rybbit-client:akash-[a-f0-9]+|ghcr.io/${OWNER}/rybbit-client:akash-${SHA}|g" docker-compose.yml
            docker compose pull backend client
            docker compose up -d --no-deps backend client
            docker compose ps backend client